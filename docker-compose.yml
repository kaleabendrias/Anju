services:
  mysql:
    image: mysql:8.0
    container_name: anju-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: anju_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - anju-network
    restart: unless-stopped

  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: anju-nacos
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      JVM_XMN: 256m
      TZ: Asia/Shanghai
    volumes:
      - ./nacos-standalone/custom.properties:/home/nacos/conf/custom.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - anju-network
    restart: unless-stopped

  anju-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anju-backend
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - NACOS_SERVER_ADDR=nacos
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=anju_db
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - TZ=Asia/Shanghai
      # Security - REQUIRED for production
      - JWT_SECRET=${JWT_SECRET:-YourSuperSecretKeyThatIsAtLeast64CharactersLongForSecurity2024!!}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-encryption-key-16chars}
      - SECURITY_FIELD_ENCRYPTION_KEY=${SECURITY_FIELD_ENCRYPTION_KEY:-encryption-key-16chars}
      - FAIL_ON_MISSING_SECRETS=${FAIL_ON_MISSING_SECRETS:-false}
    volumes:
      - maven-cache:/root/.m2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - anju-network
    restart: unless-stopped

networks:
  anju-network:
    driver: bridge
    name: anju-network

volumes:
  mysql-data:
    name: anju-mysql-data
  maven-cache:
    name: anju-maven-cache
