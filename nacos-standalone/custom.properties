server.port=8848
spring.datasource.platform=nacos
nacos.cmdb.dumpTaskInterval=3600
nacos.cmdb.eventTaskInterval=10
nacos.cmdb.labelTaskInterval=300
nacos.cmdb.loadHealthCacheInterval=30000
nacos.cmdb.globalSchedulerInterval=10000
nacos.cmdb.dumpTaskQueueSize=50000
nacos.cmdb.labelTableCacheSize=200000
nacos.cmdb.labelTableMaxSize=10000
nacos.member.list.timeout=30000
nacos.member.list.lastfresh timeoutMillis=30000

### The auth system to use, currently only 'nacos' and 'ldap' are supported:
nacos.core.auth.system.type=nacos

### If turn on auth system:
nacos.core.auth.enabled=true

### Turn on/off caching of auth information. By turning on this switch, the update of auth information will have a 15 second delay.
nacos.core.auth.caching.enabled=true
### Since the label of the cache has been removed, it is recommended that the old cache configuration be deleted after upgrading to this version.
nacos.core.auth.cache.enabled=false
nacos.core.auth.enable.userAgentAuthWhite=false
nacos.core.auth.server.identity.key=nacos-server-identity-key-2024
nacos.core.auth.server.identity.value=nacos-server-identity-value-2024
nacos.core.auth.plugin.jwt.secret.key=dFjFvZbSRjqbMGPb1Zdis+NDIucLyOXAYzA28L6rtrb2/CYnHg4iz3o0NYsG1vMzwHbNVQpOOj76QrR7dk9ByQ==
nacos.core.auth.plugin.jwt.expire.seconds=18000
nacos.core.auth.plugin.token.cache.enable=true

### The two mocks below are used for the nginx reverse proxy configuration.
nacos.core.auth.plugin.nacos.token.expire.seconds=18000
nacos.core.auth.plugin.nacos.token.cache.enable=true

management.endpoints.web.exposure.include=*

management.metrics.export.elastic.enabled=false
management.metrics.export.influx.enabled=false

server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %D %{User-Agent}i %{Request-Source}i
server.tomcat.basedir=file:.
